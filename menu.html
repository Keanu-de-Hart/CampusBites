<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusBites - Vendor Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-gray-100">

  <nav class="bg-white border-b border-gray-200 shadow-sm">
    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
      <header class="flex items-center gap-2">
        <i data-lucide="utensils" class="w-7 h-7 text-indigo-600"></i>
        <span class="text-xl font-bold text-gray-900">CampusBites</span>
      </header>

      <section class="flex items-center gap-6 mx-auto">
        <a href="index.html" class="text-gray-700 hover:text-indigo-600">Home</a>
        <a href="menu.html" class="text-gray-700 hover:text-indigo-600">Menu</a>
      </section>
    <a href="login.html" class="text-gray-700 hover:text-indigo-600">Log Out</a>

    </section>
  </nav>
  <section class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <header class="flex justify-between items-center mb-8">
        <section>
            <h2 class="text-2xl font-bold">Menu Management</h2>
            <p class="text-gray-600">Update your offerings and availability</p>
        </section>

        <button id="add-item-btn" 
            class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 flex items-center gap-2">
            <i data-lucide="plus" class="w-4 h-4"></i> Add Item
        </button>
    </header>

    <section class="bg-white rounded-xl shadow-sm overflow-hidden">
        <table class="w-full">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Item</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Category</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Price</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                </tr>
            </thead>
            <tbody id="menu-table-body" class="divide-y divide-gray-200">
                <!-- Populated by JS -->
            </tbody>
        </table>
    </section>
</section>

<!-- Add/Edit Item Modal -->
<section id="item-edit-modal"
    class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">

    <article class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto slide-in p-6">
        <h3 class="text-xl font-bold mb-4" id="modal-title">Add Menu Item</h3>

        <form id="item-form" onsubmit="vendorActions.saveItem(event)" class="space-y-4">
            <input type="hidden" id="edit-item-id">

            <section>
                <label class="block text-sm font-medium text-gray-700 mb-1">Item Name</label>
                <input type="text" id="item-name" required
                    class="w-full border rounded-lg px-3 py-2">
            </section>

            <section>
                <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                <textarea id="item-description" rows="3" required
                    class="w-full border rounded-lg px-3 py-2"></textarea>
            </section>

            <section class="grid grid-cols-2 gap-4">
                <section>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Price (R)</label>
                    <input type="number" id="item-price" step="0.01" required
                        class="w-full border rounded-lg px-3 py-2">
                </section>

                <section>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                    <select id="item-category" class="w-full border rounded-lg px-3 py-2">
                        <option>Light Meals</option>
                        <option>Main Course</option>
                        <option>Healthy</option>
                        <option>Beverages</option>
                        <option>Desserts</option>
                    </select>
                </section>
            </section>

            <section>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Allergens (SA R.146 Compliant)
                </label>

                <section class="grid grid-cols-2 gap-2">
                        <label class="flex items-center gap-2 text-sm">
                             <input type="checkbox" value="Gluten" class="item-allergen">
                            <span>Gluten</span>
                        </label>                        
                        <label class="flex items-center gap-2 text-sm">
                            <input type="checkbox" value="Dairy" class="item-allergen">
                            <span>Dairy</span>
                        </label>
                        <label class="flex items-center gap-2 text-sm">
                            <input type="checkbox" value="Eggs" class="item-allergen">
                            <span>Eggs</span>
                        </label>
                        <label class="flex items-center gap-2 text-sm">
                            <input type="checkbox" value="Peanuts" class="item-allergen">
                            <span>Peanuts</span>
                        </label>
                        <label class="flex items-center gap-2 text-sm">
                            <input type="checkbox" value="Milk" class="item-allergen">
                                <span>Milk</span>
                        </label>                        
                        <label class="flex items-center gap-2 text-sm">
                            <input type="checkbox" value="Soybeans" class="item-allergen">
                            <span>Soybeans</span>
                        </label>
                        <label class="flex items-center gap-2 text-sm">
                            <input type="checkbox" value="Mustard" class="item-allergen">
                            <span>Mustard</span>
                        </label>                        
                        <label class="flex items-center gap-2 text-sm">
                            <input type="checkbox" value="Crustaceans" class="item-allergen">
                            <span>Crustaceans</span>
                        </label>                        
                        <label class="flex items-center gap-2 text-sm">
                            <input type="checkbox" value="Lupin" class="item-allergen">
                            <span>Lupin</span>
                        </label>
                        <label class="flex items-center gap-2 text-sm">
                            <input type="checkbox" value="Molluscs" class="item-allergen">
                            <span>Molluscs</span>
                        </label>
                </section>
            </section>

            <section>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Dietary Tags
                </label>

                <section class="flex flex-wrap gap-2">
                        <label class="flex items-center gap-2 text-sm bg-gray-50 px-3 py-1 rounded-full">
                            <input type="checkbox" value="Vegan" class="item-dietary">
                            <span>Vegan</span>
                        </label>              
                        <label class="flex items-center gap-2 text-sm bg-gray-50 px-3 py-1 rounded-full">
                            <input type="checkbox" value="Vegetarian" class="item-dietary">
                            <span>Vegetarian</span>
                        </label>
                        <label class="flex items-center gap-2 text-sm bg-gray-50 px-3 py-1 rounded-full">
                            <input type="checkbox" value="Halal" class="item-dietary    ">
                            <span>Halal</span>
                        </label>
                        <label class="flex items-center gap-2 text-sm bg-gray-50 px-3 py-1 rounded-full">
                            <input type="checkbox" value="Dairy-Free" class="item-dietary">
                            <span>Dairy-Free</span>
                        </label>
                        <label class="flex items-center gap-2 text-sm bg-gray-50 px-3 py-1 rounded-full">
                            <input type="checkbox" value="Nut-Free" class="item-dietary">
                            <span>Nut-Free</span>
                        </label>
                        <label class="flex items-center gap-2 text-sm bg-gray-50 px-3 py-1 rounded-full">
                            <input type="checkbox" value="Gluten-Free" class="item-dietary">
                            <span>Gluten-Free</span>
                        </label>
                        <label class="flex items-center gap-2 text-sm bg-gray-50 px-3 py-1 rounded-full">
                            <input type="checkbox" value="Kosher" class="item-dietary">
                            <span>Kosher</span>
                        </label>
                </section>
            </section>
            <section>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                Item Image
            </label>
            <input 
                type="file" 
                id="item-image" 
                accept="image/*"
                class="w-full border rounded-lg px-3 py-2"
            >
            </section>

            <section class="flex gap-3 mt-6">
                <button type="button"
                    onclick="document.getElementById('item-edit-modal').classList.add('hidden')"
                    class="flex-1 border border-gray-300 py-2 rounded-lg hover:bg-gray-50">
                    Cancel
                </button>

                <button type="submit"
                    class="flex-1 bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">
                    Save Item
                </button>
            </section>

        </form>
    </article>
</section>
<script type="module" src="./scripts/menu.js"></script>
</body>
</html>
