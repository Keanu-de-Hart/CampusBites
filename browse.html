<script type="module">
import { Menu, MenuItem, auth, db, doc, setDoc, getDoc} from "./scripts/database.js";
lucide.createIcons();

const vegan = document.getElementById("Vegan");
const vegetarian = document.getElementById("Vegetarian");
const halal = document.getElementById("Halal");
const gluten = document.getElementById("Gluten-Free");
const menuList = document.getElementById("menu");
let menus = [];
const menu = new Menu("Jimmy");
const menu2 = new Menu("Expresso");
let cart = [];
let buttons = [];
let restrictions = [false, false, false, false];
let vendor = "AllVendors";
let category = "AllCategories";

function addToCart(menuItem){
    cart.push(menuItem);
    console.clear();
    for(let i = 0; i < cart.length; i++){
        console.log(cart[i].name);
    }
}

function update(){
    
    let html = ``;
    let num = 0;
    for(let k = 0; k < menus.length; k++){
    for(let i = 0; i < menus[k].itemList.length; i++){
        let flag = true;
        for(let j = 0; j < restrictions.length; j++){
            if(restrictions[j] && !menus[k].itemList[i].restrictions[j]){
                flag = false;
            }
        }
        if(flag && vendor != "AllVendors" && vendor != menus[k].owner){
            flag = false;
        }
        if(flag && category != "AllCategories" && category != menus[k].itemList[i].category){
            flag = false;
        }
        if(flag){
            num++;
            html += `<article class="bg-white p-4 rounded-xl shadow-sm">
                        <img src="${menus[k].itemList[i].image}" alt = "${menus[k].itemList[i].category}" class="w-full h-48 object-cover rounded-lg mb-4">
                        <section class="flex justify-between items-start mb-2">
                            <section>
                                <h3 class="text-lg font-semibold mb-2">${menus[k].itemList[i].name}</h3>
                                <p class="text-sm text-gray-500">${menus[k].owner}</p>
                            </section>
                        <span class="font-bold text-indigo-600">R${menus[k].itemList[i].price}</span>
                        </section>
                        <p class="text-sm text-gray-600 mb-3 line-clamp-2">${menus[k].itemList[i].description}</p>
                        <section class="flex gap-2">
                                <button class="flex-1 bg-gray-100 text-gray-700 py-2 rounded-lg hover:bg-gray-200 transition text-sm font-medium">
                                    Details
                                </button>
                                <button id = "${menus[k].itemList[i].name + menus[k].owner}" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition text-sm font-medium flex items-center justify-center gap-2">
                                    <i data-lucide="plus" class="w-4 h-4"></i> Add
                                </button>
                        </section>
                    </article>`;

                    //document.getElementById(`${menus[k].itemList[i].name + menus[k].owner}`).addEventListener("click", addToCart(menus[k].itemList[i]));
                    //buttons.push(document.getElementById(`${menus[k].itemList[i].name + menus[k].owner}`));
        }
        
    }
    }
    
    menuList.innerHTML = html;
    if(num == 1){
        document.getElementById("numItems").textContent = `${num} item found`;
    } else {
        document.getElementById("numItems").textContent = `${num} items found`;
    }
    
}


document.addEventListener("DOMContentLoaded", () =>{

menu.addItem(new MenuItem(1, "Test", "Test", "Test", "assets/jim.jpg", "Salad", [false, false, false, false]));
menu.addItem(new MenuItem(2, "Vegan", "Test2", "Test2", "assets/jim.jpg", "Side", [true, false, false, false]));
menu.addItem(new MenuItem(3, "Halal", "Test2", "Test2", "assets/jim.jpg", "Healthy", [false, false, false, true]));
menu.addItem(new MenuItem(4, "VegetarianGluten", "Test2", "Test2", "assets/jim.jpg", "Test2", [false, true, true, false]));
menu2.addItem(new MenuItem(5, "Expresso", "Test2", "Test2", "assets/jim.jpg", "Burger", [false, true, true, true]))
menus.push(menu);
menus.push(menu2);
let html = ``;
for(let k = 0; k < menus.length; k++){
for(let i = 0; i < menus[k].itemList.length; i++){
    html += `<article class="bg-white p-4 rounded-xl shadow-sm">
                        <img src="${menus[k].itemList[i].image}" alt = "${menus[k].itemList[i].category}" class="w-full h-48 object-cover rounded-lg mb-4">
                        <section class="flex justify-between items-start mb-2">
                            <section>
                                <h3 class="text-lg font-semibold mb-2">${menus[k].itemList[i].name}</h3>
                                <p class="text-sm text-gray-500">${menus[k].owner}</p>
                            </section>
                        <span class="font-bold text-indigo-600">R${menus[k].itemList[i].price}</span>
                        </section>
                        <p class="text-sm text-gray-600 mb-3 line-clamp-2">${menus[k].itemList[i].description}</p>
                        <section class="flex gap-2">
                                <button class="flex-1 bg-gray-100 text-gray-700 py-2 rounded-lg hover:bg-gray-200 transition text-sm font-medium">
                                    Details
                                </button>
                                <button id = "${menus[k].itemList[i].name + menus[k].owner}" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition text-sm font-medium flex items-center justify-center gap-2">
                                    <i data-lucide="plus" class="w-4 h-4"></i> Add
                                </button>
                        </section>
                    </article>`;
}
}



menuList.innerHTML = html;
menuList.addEventListener("click", (e) => {
    if (e.target.closest("button")) {
        const btn = e.target.closest("button");
        const id = btn.id;

        for (let k = 0; k < menus.length; k++) {
            for (let i = 0; i < menus[k].itemList.length; i++) {
                if (id === menus[k].itemList[i].name + menus[k].owner) {
                    addToCart(menus[k].itemList[i]);
                }
            }
        }
    }
});
});

vegan.addEventListener("click", () =>{
    if(vegan.checked == true){
        restrictions[0] = true;
    } else {
        restrictions[0] = false;
    }
    update();
});
halal.addEventListener("click", () =>{
    if(halal.checked == true){
        restrictions[3] = true;
    } else {
        restrictions[3] = false;
    }
    update();
});
gluten.addEventListener("click", () =>{
    if(gluten.checked == true){
        restrictions[2] = true;
    } else {
        restrictions[2] = false;
    }
    update();
});
vegetarian.addEventListener("click", () =>{
    if(vegetarian.checked == true){
        restrictions[1] = true;
    } else {
        restrictions[1] = false;
    }
    update();
});
document.getElementById("Vendors").addEventListener("click", () =>{
    vendor = document.getElementById("Vendors").value;
    update();
});
document.getElementById("Categories").addEventListener("click", () =>{
    category = document.getElementById("Categories").value;
    //console.log(category);
    update();
});



</script>
