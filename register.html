<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusBites - Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-gray-100">

  <section class="relative min-h-screen">
    <section class="absolute inset-0">
      <img src="assets/Matrix.jpg" alt="Campus food court background" class="w-full h-full object-cover" />
    </section>

    <section class="absolute inset-0 bg-black/65"></section>

    <section class="relative z-10 min-h-screen">
      <nav class="bg-white/95 border-b border-gray-200 shadow-sm">
        <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
          <header class="flex items-center gap-2">
            <i data-lucide="utensils" class="w-7 h-7 text-indigo-600"></i>
            <span class="text-xl font-bold text-gray-900">CampusBites</span>
          </header>

          <section class="flex items-center gap-6">
            <a href="index.html" class="text-gray-700 hover:text-indigo-600">Home</a>
            <a href="login.html" class="text-gray-700 hover:text-indigo-600">Login</a>
          </section>
        </section>
      </nav>

      <section class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-4 py-10">
        <main class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
          <header>
            <h1 class="text-2xl font-bold mb-6 text-center">Create Account</h1>
          </header>

          <section aria-labelledby="register-title">
            <h2 id="register-title" class="sr-only">Registration form</h2>

            <form id="registerForm" class="space-y-4">
              <label for="registerName" class="block mb-1 font-medium">Full Name</label>
              <section class="relative">
                <i data-lucide="user" class="absolute left-3 top-3 h-5 w-5 text-gray-400"></i>  
              <input
                type="text"
                id="registerName"
                name="registerName"
                class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none"
                placeholder="Enter your full name"
                required
              />
              </section>

              <label for="registerEmail" class="block mb-1 font-medium">Email</label>
              <section class="relative">
                <i data-lucide="mail" class="absolute left-3 top-3 h-5 w-5 text-gray-400"></i>
              <input
                type="email"
                id="registerEmail"
                name="registerEmail"
                class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none"
                placeholder="Enter your email"
                required
              />

              <label for="registerPassword" class="block mb-1 font-medium">Password</label>
              <section class="relative">
                <i data-lucide="lock" class="absolute left-3 top-3 h-5 w-5 text-gray-400"></i>
              <input
                type="password"
                id="registerPassword"
                name="registerPassword"
                class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none"
                placeholder="Enter your password"
                required
              />

              <label for="registerRole" class="block mb-1 font-medium">Role</label>
              <section class="relative">
                <i data-lucide="users" class="absolute left-3 top-3 h-5 w-5 text-gray-400"></i>
              <select
                id="registerRole"
                name="registerRole"
                class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none"
                required
              >
                <option value="">Select your role</option>
                <option value="customer">Customer</option>
                <option value="vendor">Vendor</option>
              </select>
              </section>
              <section id="shop-name-container" class="hidden">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                  Shop Name
                </label>
                <input 
                  type="text" 
                  id="shop-name"
                  class="w-full border rounded-lg px-3 py-2"
                  placeholder="e.g. Jimmy's Burgers"
                >
              </section>
              <button
                type="submit"
                class="w-full mt-4 bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition"
              >
                Create Account
              </button>
               <section class="flex items-center my-4" aria-label="Alternative sign in options">
                <hr class="flex-grow border-gray-300" />
                <span class="mx-3 text-sm text-gray-500">or continue with</span>
                <hr class="flex-grow border-gray-300" />
              </section>
              <section class="grid grid-cols-3 gap-3">
              <button
                type="button" id="googleRegister"
                class="border rounded-lg p-4 hover:bg-gray-100 transition space-y-2">
              <img src="https://www.google.com/favicon.ico" class="w-5 h-5 mx-auto">
              <span class="block text-sm">Google</span>
              </button>
              <button
                type="button" id="facebookRegister"
                class="border rounded-lg p-4 hover:bg-gray-100 transition space-y-2">
              <svg class="w-5 h-5 mx-auto" fill="#1877F2" viewBox="0 0 24 24">
                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
              </svg>
              <span class="block text-sm">Facebook</span>
              </button>
              <button type="button" id="microsoftRegister"
                  class="border rounded-lg p-4 hover:bg-gray-100 transition space-y-2">
                  <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg"
                  class="w-5 h-5 mx-auto">
                  <span class="block text-sm">Microsoft</span>
              </button>
              </section>
              <section class="mt-3 grid grid-cols-2 gap-3">

              <button type="button" id="appleRegister"
                  class="border rounded-lg p-4 hover:bg-gray-100 transition space-y-2">
                  <svg class="w-5 h-5 mx-auto" fill="black" viewBox="0 0 24 24">
                  <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-2.06 1.25-1.7 4.62.22 5.52-.53 1.52-1.24 3.03-2.27 4.69zM12.03 7.25c-.15-2.35 1.66-4.35 3.84-4.65.29 2.32-2.14 4.48-3.84 4.65z"/>
                  </svg>
                  <span class="block text-sm">Apple</span>
                </button>
                <button type="button" id="twitterRegister"
                  class="border rounded-lg p-4 hover:bg-gray-100 transition space-y-2">
                  <svg class="w-5 h-5 mx-auto" fill="#1DA1F2" viewBox="0 0 24 24">
                  <path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/>
                  </svg>
                  <span class="block text-sm">Twitter</span>
                </button>
              </section>
            </form>
          </section>

          <footer>
            <p class="mt-4 text-center text-sm text-gray-600">
              Already have an account?
              <a href="login.html" class="text-indigo-600 font-semibold hover:underline">
                Login
              </a>
            </p>
          </footer>
        </main>
      </section>
    </section>
  </section>

  <script type="module" src="scripts/register.js"></script>
</body>
</html>
