<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusBites - Vendor Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="min-h-screen bg-gray-100">

  <nav class="bg-white border-b border-gray-200 shadow-sm">
    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
      <header class="flex items-center gap-2">
        <i data-lucide="utensils" class="w-7 h-7 text-indigo-600"></i>
        <span class="text-xl font-bold text-gray-900">CampusBites</span>
      </header>

      <section class="flex items-center gap-6 mx-auto">
        <a href="index.html" class="text-gray-700 hover:text-indigo-600">Home</a>
        <a href="browse.html" class="text-gray-700 hover:text-indigo-600">Browse</a>
        <a id="CustomerdashboardLink" href="customer-dashboard.html" class="text-gray-700 hover:text-indigo-600 hidden">Dashboard</a>
        <a id="CustomerProfileLink" href="customer-profile.html" class="text-gray-700 hover:text-indigo-600 hidden">My Account</a>
        <a id="CheckOutLink" href="checkOut.html" class="text-gray-700 hover:text-indigo-600 hidden">Orders</a>
      </section>

      <section class="flex items-center gap-4">
        <a href="login.html" id="loginLink" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition">
          Sign in
        </a>

        <button id="logoutBtn" class="bg-gray-200 text-gray-800 px-4 py-2 rounded-lg hover:bg-gray-300 transition hidden">
          Log Out
        </button>
      </section>
    </section>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

    <section class="bg-white rounded-2xl shadow-md p-6 mb-8">
      <section class="flex flex-col md:flex-row gap-6 items-center md:items-start">

        <section
          id="vendorImageFallback"
          class="w-32 h-32 rounded-full border border-gray-200 bg-gray-100 flex items-center justify-center"
        >
          <i data-lucide="store" class="w-14 h-14 text-gray-400"></i>
        </section>

        <img
          id="vendorImage"
          src=""
          alt="Vendor logo"
          class="hidden w-32 h-32 rounded-full object-cover border border-gray-200 bg-gray-100"
        />

        <section class="flex-1 text-center md:text-left">
          <h1 id="vendorName" class="text-3xl md:text-4xl font-bold text-gray-900">
            Vendor Name
          </h1>

          <p id="vendorLocation" class="mt-2 text-gray-600">
            Vendor location
          </p>

          <section class="mt-4 flex flex-wrap justify-center md:justify-start gap-3">
            <span id="vendorStatus" class="px-3 py-1 rounded-full text-sm font-semibold bg-gray-100 text-gray-700">
              Loading status
            </span>

            <span id="vendorHours" class="px-3 py-1 rounded-full text-sm bg-indigo-50 text-indigo-700">
              Loading hours
            </span>
          </section>
        </section>

      </section>
    </section>

    <section class="mb-8">
      <header class="mb-6">
        <h2 class="text-2xl font-bold text-gray-900">
          Vendor Menu
        </h2>
        <p class="text-gray-600">
          View available items from this vendor.
        </p>
      </header>

      <section id="vendorMenu" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <p class="text-gray-500">Loading menu items...</p>
      </section>
    </section>

  </main>

  <script type="module">
    import { initAuthUI, logout } from "./scripts/auth.js";

    initAuthUI();
    lucide.createIcons();

    document.getElementById("logoutBtn")?.addEventListener("click", logout);
  </script>

  <script type="module" src="./scripts/vendor-profile.js"></script>

</body>
</html>
