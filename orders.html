<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management</title>
     <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
     <nav class="bg-white border-b border-gray-200 shadow-sm">
    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
      <header class="flex items-center gap-2">
        <i data-lucide="utensils" class="w-7 h-7 text-indigo-600"></i>
        <span class="text-xl font-bold text-gray-900">CampusBites</span>
      </header>

      <section class="flex items-center gap-6 mx-auto">
        <a href="index.html" class="text-gray-700 hover:text-indigo-600">Home</a>
        <a href="vendor-dashboard.html" class="text-gray-700 hover:text-indigo-600">Dashboard</a>
        <a href="menu-management.html" class="text-gray-700 hover:text-indigo-600">Menu</a>
      </section>
    <a href="login.html" id="logoutBtn" class="bg-gray-200 text-gray-800 px-4 py-2 rounded-lg hover:bg-gray-300 transition hidden">Log Out</a>
    </section>
  </nav>

    <section class="max-w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <header class="flex justify-between items-center mb-8">
        <section>
            <h2 class="text-2xl font-bold">Order Management</h2>
            <p class="text-gray-600">View and Update orders</p>
        </section>

        
    </header>

    <section class="py-12 bg-gray-50 rounded-2xl shadow">
  <section class="max-w-full mx-auto px-4">

    <header class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

      <!-- Column 1 -->
      <article class="bg-white p-6 rounded-2xl shadow">
        <i data-lucide="rocket" class="w-8 h-8 text-blue-500 mb-4"></i>
        <h3 class="text-xl font-semibold mb-2">New Orders</h3>
        <p class="text-gray-600">
          Your app runs quickly and smoothly with optimized performance.
        </p>
      </article>

      <!-- Column 2 -->
      <article class="bg-white p-6 rounded-2xl shadow">
        <i data-lucide="shield" class="w-8 h-8 text-green-500 mb-4"></i>
        <h3 class="text-xl font-semibold mb-2">In Progress</h3>
        <p class="text-gray-600">
          Built with security in mind to protect your data.
        </p>
      </article>

      <!-- Column 3 -->
      <article class="bg-white p-6 rounded-2xl shadow">
        <i data-lucide="users" class="w-8 h-8 text-purple-500 mb-4"></i>
        <h3 class="text-xl font-semibold mb-2">Completed orders</h3>
        <p class="text-gray-600">
          Designed for a smooth and intuitive experience.
        </p>
      </article>

    </header>

     <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mt-2">

      <!-- Column 1 -->
      <section id="newOrders" aria-label="New orders" class="bg-white p-6 rounded-2xl shadow">
        <i data-lucide="rocket" class="w-8 h-8 text-blue-500 mb-4"></i>

      </section>

      <!-- Column 2 -->
      <section id="inProgress" aria-label="In progress orders" class="bg-white p-6 rounded-2xl shadow">
        <i data-lucide="shield" class="w-8 h-8 text-green-500 mb-4"></i>

      </section>

      <!-- Column 3 -->
      <section id="completedOrders" aria-label="Completed orders" class="bg-white p-6 rounded-2xl shadow">
        <i data-lucide="users" class="w-8 h-8 text-purple-500 mb-4"></i>

      </section>

    </section>

  </section>
</section>

</section>
<script type="module" src="scripts/orders.js">
  lucide.createIcons();
</script>
    
</body>
</html>
